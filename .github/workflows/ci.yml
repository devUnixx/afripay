name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm run test:ci
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/lancepay_test"
          DIRECT_URL: "postgresql://test:test@localhost:5432/lancepay_test"
          NEXT_PUBLIC_PRIVY_APP_ID: "test-app-id"
          PRIVY_APP_SECRET: "test-secret"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-type-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/lancepay"
          DIRECT_URL: "postgresql://test:test@localhost:5432/lancepay"
          NEXT_PUBLIC_PRIVY_APP_ID: "test-app-id"
          PRIVY_APP_SECRET: "test-secret"
          NEXT_PUBLIC_MOONPAY_API_KEY: "test-key"
          MOONPAY_SECRET_KEY: "test-secret"
          MOONPAY_WEBHOOK_SECRET: "test-secret"
          YELLOW_CARD_API_KEY: "test-key"
          YELLOW_CARD_API_SECRET: "test-secret"
          RESEND_API_KEY: "re_test"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          STELLAR_PLATFORM_WALLET_SECRET: "STEST"
          NEXT_PUBLIC_STELLAR_PLATFORM_WALLET_PUBLIC: "GTEST"
          CRON_SECRET: "test-cron-secret"
